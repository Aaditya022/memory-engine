# Production overlay. Use together with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# What this changes vs. the base file:
#   - Postgres/Redis ports are NOT published to the host (only reachable inside the
#     compose network) — the base file's 5432/6379 host bindings are for local dev only.
#   - Adds an nginx reverse proxy terminating TLS (via certbot) in front of the app.
#   - Adds restart policies and basic resource limits.
#   - Prometheus/Grafana are not published publicly by default — access via SSH tunnel
#     or put them behind the same nginx + basic auth if you want a public dashboard.

version: "3.9"

services:
  postgres:
    ports: []  # override: do not publish 5432 to the host
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    env_file: .env

  redis:
    ports: []  # override: do not publish 6379 to the host
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 300M

  app:
    ports: []  # override: app is reached only via nginx, not directly on 8080
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1536M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  prometheus:
    ports: []  # not published publicly; use `docker compose exec` or an SSH tunnel
    restart: unless-stopped

  grafana:
    ports: []  # same as above
    restart: unless-stopped
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}

  nginx:
    image: nginx:1.27-alpine
    container_name: memory-engine-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot
    container_name: memory-engine-certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;"
