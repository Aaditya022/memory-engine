apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: memory-engine
  namespace: memory-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: memory-engine
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
