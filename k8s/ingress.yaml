apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: memory-engine
  namespace: memory-engine
  annotations:
    # Example for cert-manager + nginx-ingress. Swap for your ingress controller's equivalents.
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
    - hosts: ["api.yourdomain.com"]
      secretName: memory-engine-tls
  rules:
    - host: api.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: memory-engine
                port:
                  number: 80
