# Reverse proxy + TLS termination for the memory-engine API.
# ${DOMAIN_NAME} below is a placeholder — replace with your real domain
# (this file is NOT env-substituted automatically by plain nginx; either
# sed-replace it during deploy, or use envsubst — see nginx/init-letsencrypt.sh).

server {
    listen 80;
    server_name DOMAIN_NAME_PLACEHOLDER;

    # ACME HTTP-01 challenge path for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name DOMAIN_NAME_PLACEHOLDER;

    ssl_certificate     /etc/letsencrypt/live/DOMAIN_NAME_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_NAME_PLACEHOLDER/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Basic hardening headers (the app also sets some of these; belt & suspenders)
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10m;  # transcripts can be long; adjust if needed

    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://app:8080/health;
        access_log off;
    }
}
