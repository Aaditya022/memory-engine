spring:
  application:
    name: memory-engine

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:memory_engine}
    username: ${DB_USER:memory_engine}
    password: ${DB_PASSWORD:memory_engine}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      time-to-live: 600000 # 10 minutes default TTL

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: cognee-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.mnemo.memoryengine.cognee.kafka
    listener:
      missing-topics-fatal: false

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-super-secret-key-in-production-min-32-chars}
    access-token-ttl-minutes: 60
    refresh-token-ttl-days: 7
  cors:
    # Comma-separated list of allowed origin patterns. "*" is the local-dev default —
    # production MUST override this via the APP_CORS_ALLOWED_ORIGINS env var, e.g.
    # "https://app.yourdomain.com,https://admin.yourdomain.com"
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}
  rate-limit:
    max-requests: ${RATE_LIMIT_MAX_REQUESTS:100}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    embedding-model: text-embedding-004
    generation-model: gemini-2.5-flash
    base-url: https://generativelanguage.googleapis.com/v1beta
  search:
    vector-weight: 0.6
    bm25-weight: 0.4
    default-top-k: 10
  cognee:
    api-url: ${COGNEE_API_URL:http://localhost:8000}
    api-key: ${COGNEE_API_KEY:}
    timeout-ms: ${COGNEE_TIMEOUT_MS:10000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.mnemo.memoryengine: INFO
    org.hibernate.SQL: WARN
